name: Weekly AI Intel

# Fires Mondays 13:00 UTC. Change the cron to taste; keep it weekly —
# AI news doesn't clear a daily signal bar and reads better batched.
on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch: {}          # lets you trigger a run by hand from the Actions tab

permissions:
  contents: write                # the job commits the new issue straight to main
  id-token: write                # claude-code-action fetches an OIDC token to authenticate

concurrency:
  group: weekly-ai-intel         # a slow run won't overlap the next scheduled one
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    # Run the whole job inside Microsoft's official Playwright image, which ships
    # Chromium + all its system libraries prebuilt. That's what lets the browser
    # fetch fallback (scripts/fetch.mjs) work with zero per-run browser install.
    # The image tag MUST match the playwright version installed below (the image
    # ships Chromium at exactly that version) — bump both together.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@v4

      # Install the Playwright JS client into the repo's node_modules so the
      # ESM import in scripts/fetch.mjs resolves it. --no-save keeps it out of
      # package.json, so a Vercel site build never pulls it (and never downloads
      # Chromium). Browsers are already baked into the container, so the download
      # is skipped — this is just a few seconds of JS.
      - name: Install Playwright client
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm install --no-save playwright@1.61.1

      # The maker: Claude Code runs headless, does the research, writes the issue
      # markdown, and updates the dedup manifest. Tool surface is scoped tight so
      # an unattended run can't touch anything outside content/ and data/.
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Surface the agent's real output/errors in the logs. The default hides
          # them, so an API rejection (bad key, no model access) reads as a silent
          # green run that commits nothing. Drop this once runs are healthy.
          show_full_output: true
          prompt: >-
            Read CLAUDE.md and prompts/research.md, then produce this week's
            issue exactly as those files specify. Load data/manifest.json before
            researching so you don't repeat recently-covered stories.
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 40
            --allowedTools "Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,Bash(node scripts/score.mjs:*),Bash(node scripts/fetch.mjs:*)"

      # The plumbing: deterministic git, not the agent's job. Push to main is what
      # triggers the Vercel deploy (Vercel's Git integration handles the build).
      - name: Commit & publish
        env:
          # claude-code-action strips the auth header actions/checkout installed,
          # so a bare `git push` fails. Push to an explicitly authenticated URL
          # with the built-in token (contents: write is granted above).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "ai-intel-bot"
          git config user.email "ai-intel-bot@users.noreply.github.com"
          git add content/ data/manifest.json
          if git diff --cached --quiet; then
            echo "Nothing new this week — no commit."
          else
            git commit -m "intel: issue $(date -u +%F)"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          fi
